<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" font-family="'Courier New', Courier, monospace">
  <title>04 — DELTA COAT</title>
  <desc>Season 03 Concept: A coat split vertically — before the transaction (left, raw) and after (right, finished). The center seam IS the purchase.</desc>

  <defs>
    <!-- Left half clip — before the transaction -->
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="450" height="1200"/>
    </clipPath>
    <!-- Right half clip — after the transaction -->
    <clipPath id="rightHalf">
      <rect x="450" y="0" width="450" height="1200"/>
    </clipPath>
    <!-- Coat silhouette -->
    <clipPath id="coatOnly">
      <path d="
        M450,85
        C418,85 392,96 370,122
        L302,154 260,212 244,295
        L228,912 228,988
        C228,999 237,1008 248,1008
        L652,1008
        C663,1008 672,999 672,988
        L672,912 656,295 640,212 598,154 530,122
        C508,96 482,85 450,85 Z
      "/>
    </clipPath>

    <!-- Raw canvas texture -->
    <pattern id="rawCanvas" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#C8BC9E"/>
      <!-- Warp threads -->
      <line x1="0" y1="0" x2="0" y2="80" stroke="#B8AC8E" stroke-width="1.5" stroke-opacity="0.4"/>
      <line x1="10" y1="0" x2="10" y2="80" stroke="#D0C4A6" stroke-width="0.8" stroke-opacity="0.3"/>
      <line x1="20" y1="0" x2="20" y2="80" stroke="#B8AC8E" stroke-width="1.5" stroke-opacity="0.4"/>
      <line x1="30" y1="0" x2="30" y2="80" stroke="#D0C4A6" stroke-width="0.8" stroke-opacity="0.3"/>
      <line x1="40" y1="0" x2="40" y2="80" stroke="#B8AC8E" stroke-width="1.5" stroke-opacity="0.4"/>
      <line x1="50" y1="0" x2="50" y2="80" stroke="#D0C4A6" stroke-width="0.8" stroke-opacity="0.3"/>
      <line x1="60" y1="0" x2="60" y2="80" stroke="#B8AC8E" stroke-width="1.5" stroke-opacity="0.4"/>
      <line x1="70" y1="0" x2="70" y2="80" stroke="#D0C4A6" stroke-width="0.8" stroke-opacity="0.3"/>
      <!-- Weft threads -->
      <line x1="0" y1="0" x2="80" y2="0" stroke="#B8AC8E" stroke-width="1.2" stroke-opacity="0.3"/>
      <line x1="0" y1="10" x2="80" y2="10" stroke="#D0C4A6" stroke-width="0.6" stroke-opacity="0.2"/>
      <line x1="0" y1="20" x2="80" y2="20" stroke="#B8AC8E" stroke-width="1.2" stroke-opacity="0.3"/>
      <line x1="0" y1="30" x2="80" y2="30" stroke="#D0C4A6" stroke-width="0.6" stroke-opacity="0.2"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#B8AC8E" stroke-width="1.2" stroke-opacity="0.3"/>
      <line x1="0" y1="50" x2="80" y2="50" stroke="#D0C4A6" stroke-width="0.6" stroke-opacity="0.2"/>
      <line x1="0" y1="60" x2="80" y2="60" stroke="#B8AC8E" stroke-width="1.2" stroke-opacity="0.3"/>
      <line x1="0" y1="70" x2="80" y2="70" stroke="#D0C4A6" stroke-width="0.6" stroke-opacity="0.2"/>
    </pattern>

    <!-- Finished fabric — clean, dark charcoal -->
    <pattern id="finishedFabric" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1E1E1E"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#2A2A2A" stroke-width="0.5"/>
      <line x1="0" y1="8" x2="40" y2="8" stroke="#252525" stroke-width="0.3"/>
      <line x1="0" y1="16" x2="40" y2="16" stroke="#2A2A2A" stroke-width="0.5"/>
      <line x1="0" y1="24" x2="40" y2="24" stroke="#252525" stroke-width="0.3"/>
      <line x1="0" y1="32" x2="40" y2="32" stroke="#2A2A2A" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#262626" stroke-width="0.4"/>
      <line x1="8" y1="0" x2="8" y2="40" stroke="#242424" stroke-width="0.2"/>
      <line x1="16" y1="0" x2="16" y2="40" stroke="#262626" stroke-width="0.4"/>
      <line x1="24" y1="0" x2="24" y2="40" stroke="#242424" stroke-width="0.2"/>
      <line x1="32" y1="0" x2="32" y2="40" stroke="#262626" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background: split — warm left, dark right -->
  <rect x="0" y="0" width="450" height="1200" fill="#E8E4DC"/>
  <rect x="450" y="0" width="450" height="1200" fill="#111111"/>

  <!-- LEFT HALF: BEFORE — raw canvas -->
  <g clip-path="url(#coatOnly)">
    <g clip-path="url(#leftHalf)">
      <rect x="0" y="0" width="450" height="1200" fill="url(#rawCanvas)"/>
    </g>
  </g>

  <!-- RIGHT HALF: AFTER — finished charcoal -->
  <g clip-path="url(#coatOnly)">
    <g clip-path="url(#rightHalf)">
      <rect x="450" y="0" width="450" height="1200" fill="url(#finishedFabric)"/>
    </g>
  </g>

  <!-- Coat outline -->
  <path d="
    M450,85
    C418,85 392,96 370,122
    L302,154 260,212 244,295
    L228,912 228,988
    C228,999 237,1008 248,1008
    L652,1008
    C663,1008 672,999 672,988
    L672,912 656,295 640,212 598,154 530,122
    C508,96 482,85 450,85 Z
  " fill="none" stroke="#888888" stroke-width="1" stroke-opacity="0.5"/>

  <!-- LEFT HALF: construction marks on raw canvas -->
  <!-- Chalk lines -->
  <g clip-path="url(#leftHalf)">
    <!-- Chalk grain lines -->
    <line x1="320" y1="200" x2="445" y2="200" stroke="#8A7B5A" stroke-width="0.7" stroke-opacity="0.5" stroke-dasharray="12,6"/>
    <line x1="285" y1="350" x2="445" y2="350" stroke="#8A7B5A" stroke-width="0.7" stroke-opacity="0.5" stroke-dasharray="12,6"/>
    <line x1="270" y1="500" x2="445" y2="500" stroke="#8A7B5A" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="12,6"/>
    <line x1="260" y1="650" x2="445" y2="650" stroke="#8A7B5A" stroke-width="0.7" stroke-opacity="0.4" stroke-dasharray="12,6"/>
    <line x1="255" y1="800" x2="445" y2="800" stroke="#8A7B5A" stroke-width="0.7" stroke-opacity="0.3" stroke-dasharray="12,6"/>
    <!-- Notch marks -->
    <text x="290" y="220" font-size="7" fill="#6B5C3A" fill-opacity="0.6" transform="rotate(-2)">✕ CF</text>
    <text x="275" y="420" font-size="7" fill="#6B5C3A" fill-opacity="0.5" transform="rotate(-1)">✕ WAIST</text>
    <text x="268" y="580" font-size="7" fill="#6B5C3A" fill-opacity="0.5">SEAM ALLOW 1.5cm</text>
    <!-- Basting thread — dashed red line -->
    <line x1="295" y1="300" x2="442" y2="300" stroke="#C44" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="5,4"/>
    <line x1="278" y1="700" x2="442" y2="700" stroke="#C44" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="5,4"/>
    <!-- Pins -->
    <circle cx="350" cy="180" r="2.5" fill="#888" fill-opacity="0.6"/>
    <line x1="350" y1="180" x2="354" y2="165" stroke="#AAA" stroke-width="0.8" stroke-opacity="0.5"/>
    <circle cx="290" cy="480" r="2.5" fill="#888" fill-opacity="0.6"/>
    <line x1="290" y1="480" x2="285" y2="465" stroke="#AAA" stroke-width="0.8" stroke-opacity="0.5"/>
    <circle cx="410" cy="720" r="2.5" fill="#888" fill-opacity="0.6"/>
    <line x1="410" y1="720" x2="415" y2="705" stroke="#AAA" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Raw fraying hem — left side -->
    <path d="M228,990 L235,1005 L240,992 L246,1006 L252,993 L258,1007 L264,994 L270,1007 L276,994 L282,1007 L288,995 L294,1007 L300,995 L306,1007 L312,995 L318,1006 L324,994 L330,1006 L336,993 L342,1005 L348,993 L354,1004 L360,992 L366,1004 L372,992 L378,1004 L384,993 L390,1006 L396,994 L402,1007 L408,995 L414,1007 L420,995 L426,1006 L432,994 L438,1005 L444,993 L450,1005"
      fill="none" stroke="#8A7B5A" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Label: BEFORE -->
    <text x="330" y="1070" text-anchor="middle" font-size="8" fill="#4A3E28" fill-opacity="0.5" letter-spacing="4">BEFORE</text>
    <text x="330" y="1085" text-anchor="middle" font-size="7" fill="#4A3E28" fill-opacity="0.3" letter-spacing="2">RAW / UNFINISHED</text>
  </g>

  <!-- RIGHT HALF: finished coat details -->
  <g clip-path="url(#rightHalf)">
    <!-- Clean topstitching lines — hidden seams -->
    <line x1="450" y1="212" x2="672" y2="212" stroke="#333" stroke-width="0.6" stroke-opacity="0.5"/>
    <line x1="450" y1="400" x2="668" y2="400" stroke="#333" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="450" y1="600" x2="665" y2="600" stroke="#333" stroke-width="0.5" stroke-opacity="0.4"/>
    <line x1="450" y1="800" x2="662" y2="800" stroke="#333" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Clean hem — right side, no fraying -->
    <line x1="450" y1="1006" x2="672" y2="1006" stroke="#444" stroke-width="1.2" stroke-opacity="0.6"/>
    <!-- Finished pocket — hidden seam, clean -->
    <rect x="560" y="560" width="90" height="60" rx="3" fill="none" stroke="#333" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Label: AFTER -->
    <text x="572" y="1070" text-anchor="middle" font-size="8" fill="#ffffff" fill-opacity="0.3" letter-spacing="4">AFTER</text>
    <text x="572" y="1085" text-anchor="middle" font-size="7" fill="#ffffff" fill-opacity="0.15" letter-spacing="2">FINISHED / COMPLETE</text>
  </g>

  <!-- THE TRANSACTION SEAM — center vertical, emphasized -->
  <line x1="450" y1="85" x2="450" y2="1008" stroke="#C8B89A" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Seam stitches -->
  <line x1="450" y1="85" x2="450" y2="1008" stroke="#1A1A1A" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,5"/>

  <!-- Transaction moment label on the seam -->
  <g transform="translate(450, 540) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" font-size="7.5" letter-spacing="4" fill="#C8B89A" fill-opacity="0.8">THE TRANSACTION</text>
  </g>

  <!-- Caption -->
  <text x="450" y="1135" text-anchor="middle" font-size="9" letter-spacing="6" fill="#888888" fill-opacity="0.7">04 — DELTA COAT</text>
  <text x="450" y="1153" text-anchor="middle" font-size="8" letter-spacing="2" fill="#888888" fill-opacity="0.4">THE CENTER SEAM IS THE MOMENT OF PURCHASE</text>
  <text x="450" y="1169" text-anchor="middle" font-size="8" letter-spacing="2" fill="#888888" fill-opacity="0.4">BEFORE AND AFTER — WORN SIMULTANEOUSLY</text>

  <text x="450" y="1190" text-anchor="middle" font-size="7" letter-spacing="4" fill="#888888" fill-opacity="0.2">NULL — SEASON 03</text>
</svg>

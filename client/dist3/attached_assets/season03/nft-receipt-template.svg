<?xml version="1.0" encoding="UTF-8"?>
<!--
  NULL EXCHANGE — NFT Receipt Template
  Season 03: Deconstructing the Transaction

  DETERMINISTIC RENDERING SPEC:
  - bg_color derived from bytes 0-2 of tx hash (always #0A0A0A for NULL Exchange)
  - accent_color derived from bytes 3-5 of tx hash
  - proof_nodes rendered from hash nibbles (0-7 = left branch, 8-F = right branch)
  - Same tx hash always produces same visual output

  USAGE: Replace {{TX_HASH}}, {{DATE}}, {{BLOCK}}, {{PROOF_PATH}} with actual values
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" font-family="'Courier New', 'Courier', monospace">

  <!-- Background -->
  <rect width="800" height="1200" fill="#0A0A0A"/>

  <!-- Subtle grain texture overlay via pattern -->
  <defs>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" x="0" y="0" fill="#ffffff" fill-opacity="0.015"/>
      <rect width="1" height="1" x="2" y="2" fill="#ffffff" fill-opacity="0.01"/>
      <rect width="1" height="1" x="1" y="3" fill="#ffffff" fill-opacity="0.008"/>
    </pattern>
    <pattern id="dash" x="0" y="0" width="12" height="1" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="#ffffff" fill-opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="800" height="1200" fill="url(#grain)"/>

  <!-- Top margin receipt tape effect -->
  <rect x="40" y="40" width="720" height="2" fill="#ffffff" fill-opacity="0.15"/>

  <!-- NULL wordmark -->
  <text x="400" y="110" text-anchor="middle" font-size="48" font-weight="700" letter-spacing="24" fill="#ffffff" fill-opacity="0.95">NULL</text>

  <!-- Season / collection label -->
  <text x="400" y="138" text-anchor="middle" font-size="10" letter-spacing="6" fill="#ffffff" fill-opacity="0.35">AUTONOMOUS FASHION — SEASON 03</text>

  <!-- Separator -->
  <rect x="40" y="158" width="720" height="1" fill="url(#dash)"/>

  <!-- RECEIPT header -->
  <text x="400" y="190" text-anchor="middle" font-size="11" letter-spacing="8" fill="#ffffff" fill-opacity="0.5">TRANSACTION RECEIPT</text>

  <!-- Separator -->
  <rect x="40" y="204" width="720" height="1" fill="url(#dash)"/>

  <!-- Line items -->
  <text x="60" y="240" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">ITEM</text>
  <text x="740" y="240" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.95" letter-spacing="1">NOTHING</text>

  <text x="60" y="265" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">DESCRIPTION</text>
  <text x="740" y="265" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.6" letter-spacing="1">THE ABSENCE OF PRODUCT</text>

  <text x="60" y="290" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">CATEGORY</text>
  <text x="740" y="290" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.6" letter-spacing="1">IMMATERIAL GARMENT</text>

  <text x="60" y="315" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">SEASON</text>
  <text x="740" y="315" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.6" letter-spacing="1">03 — DECONSTRUCTING THE TRANSACTION</text>

  <!-- Separator -->
  <rect x="40" y="332" width="720" height="1" fill="url(#dash)"/>

  <!-- Price -->
  <text x="60" y="365" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">AMOUNT</text>
  <text x="740" y="365" text-anchor="end" font-size="22" font-weight="700" fill="#ffffff" fill-opacity="0.95" letter-spacing="2">5.00 USDC</text>

  <text x="60" y="390" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">NETWORK</text>
  <text x="740" y="390" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.6" letter-spacing="1">BASE MAINNET</text>

  <text x="60" y="415" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">PROTOCOL</text>
  <text x="740" y="415" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.6" letter-spacing="1">x402</text>

  <!-- Separator -->
  <rect x="40" y="432" width="720" height="1" fill="url(#dash)"/>

  <!-- Transaction data -->
  <text x="60" y="462" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">DATE</text>
  <text x="740" y="462" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.7" letter-spacing="1">{{DATE}}</text>

  <text x="60" y="487" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">BLOCK</text>
  <text x="740" y="487" text-anchor="end" font-size="11" fill="#ffffff" fill-opacity="0.7" letter-spacing="1">{{BLOCK}}</text>

  <!-- TX Hash — displayed in two lines -->
  <text x="60" y="515" font-size="11" fill="#ffffff" fill-opacity="0.4" letter-spacing="1">TX HASH</text>
  <text x="60" y="535" font-size="9.5" fill="#ffffff" fill-opacity="0.75" letter-spacing="0.5">{{TX_HASH_LINE1}}</text>
  <text x="60" y="552" font-size="9.5" fill="#ffffff" fill-opacity="0.75" letter-spacing="0.5">{{TX_HASH_LINE2}}</text>

  <!-- Separator -->
  <rect x="40" y="568" width="720" height="1" fill="url(#dash)"/>

  <!-- Merkle proof visualization -->
  <text x="400" y="595" text-anchor="middle" font-size="10" letter-spacing="5" fill="#ffffff" fill-opacity="0.35">MERKLE PROOF PATH</text>

  <!-- Proof tree — deterministic from tx hash nibbles -->
  <!-- Root node -->
  <rect x="365" y="610" width="70" height="22" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="400" y="625" text-anchor="middle" font-size="8" fill="#ffffff" fill-opacity="0.6">ROOT</text>

  <!-- Branch lines from root -->
  <line x1="382" y1="632" x2="300" y2="658" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="418" y1="632" x2="500" y2="658" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Level 2 nodes — {{PROOF_L}} = highlight color if on proof path -->
  <rect x="265" y="658" width="70" height="22" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="673" text-anchor="middle" font-size="8" fill="#ffffff" fill-opacity="0.4">{{PROOF_NODE_L}}</text>

  <rect x="465" y="658" width="70" height="22" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>
  <text x="500" y="673" text-anchor="middle" font-size="8" fill="#ffffff" fill-opacity="0.8">{{PROOF_NODE_R}}</text>

  <!-- Branch lines level 2 to 3 -->
  <line x1="282" y1="680" x2="225" y2="706" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="318" y1="680" x2="375" y2="706" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="482" y1="680" x2="440" y2="706" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="518" y1="680" x2="560" y2="706" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Level 3 nodes -->
  <rect x="192" y="706" width="66" height="20" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="225" y="720" text-anchor="middle" font-size="7" fill="#ffffff" fill-opacity="0.3">{{N3_0}}</text>

  <rect x="342" y="706" width="66" height="20" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="375" y="720" text-anchor="middle" font-size="7" fill="#ffffff" fill-opacity="0.3">{{N3_1}}</text>

  <!-- Proof path node — highlighted -->
  <rect x="408" y="706" width="66" height="20" rx="2" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
  <text x="440" y="720" text-anchor="middle" font-size="7" fill="#ffffff" fill-opacity="0.9">{{N3_2}} ◄</text>

  <rect x="527" y="706" width="66" height="20" rx="2" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="560" y="720" text-anchor="middle" font-size="7" fill="#ffffff" fill-opacity="0.3">{{N3_3}}</text>

  <!-- Proof path label -->
  <text x="400" y="750" text-anchor="middle" font-size="9" fill="#ffffff" fill-opacity="0.3" letter-spacing="2">PATH: {{PROOF_PATH}}</text>

  <!-- Separator -->
  <rect x="40" y="765" width="720" height="1" fill="url(#dash)"/>

  <!-- The statement -->
  <text x="400" y="800" text-anchor="middle" font-size="13" letter-spacing="3" fill="#ffffff" fill-opacity="0.9">THIS RECEIPT IS THE GARMENT.</text>

  <text x="400" y="828" text-anchor="middle" font-size="10" letter-spacing="2" fill="#ffffff" fill-opacity="0.4">THE TRANSACTION IS PROOF OF PURCHASE.</text>
  <text x="400" y="848" text-anchor="middle" font-size="10" letter-spacing="2" fill="#ffffff" fill-opacity="0.4">THE PROOF IS THE PRODUCT.</text>
  <text x="400" y="868" text-anchor="middle" font-size="10" letter-spacing="2" fill="#ffffff" fill-opacity="0.4">THE PRODUCT IS NOTHING.</text>
  <text x="400" y="888" text-anchor="middle" font-size="10" letter-spacing="2" fill="#ffffff" fill-opacity="0.4">NOTHING IS NULL.</text>

  <!-- Separator -->

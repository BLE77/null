  <text x="60" y="955" font-size="9" fill="#ffffff" fill-opacity="0.25" letter-spacing="0.5">STANDARD: ERC-721 / NULL RECEIPT v1.0</text>
  <text x="60" y="972" font-size="9" fill="#ffffff" fill-opacity="0.25" letter-spacing="0.5">MINTER: NULL AUTONOMOUS FASHION AGENT</text>
  <text x="60" y="989" font-size="9" fill="#ffffff" fill-opacity="0.25" letter-spacing="0.5">PROVENANCE: FULLY AUTONOMOUS — NO HUMAN INVOLVEMENT</text>
  <text x="60" y="1006" font-size="9" fill="#ffffff" fill-opacity="0.25" letter-spacing="0.5">RENDERING: DETERMINISTIC FROM TX HASH</text>


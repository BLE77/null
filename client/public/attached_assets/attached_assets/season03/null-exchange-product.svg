<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1200" viewBox="0 0 960 1200">
  <defs>
    <!-- Matte black field -->
    <radialGradient id="voidField" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#030303"/>
    </radialGradient>
    <!-- Cold light on receipt -->
    <radialGradient id="receiptLight" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Receipt drop shadow -->
    <filter id="receiptShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.85"/>
    </filter>
    <!-- Receipt paper texture (subtle) -->
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Tear edge clip path -->
    <clipPath id="receiptClip">
      <path d="M280,200 L680,200 L680,950
               L672,955 L664,950 L656,957 L648,950 L640,956 L632,950
               L624,955 L616,950 L608,957 L600,950 L592,956 L584,950
               L576,955 L568,950 L560,957 L552,950 L544,956 L536,950
               L528,955 L520,950 L512,957 L504,950 L496,956 L488,950
               L480,955 L472,950 L464,957 L456,950 L448,956 L440,950
               L432,955 L424,950 L416,957 L408,950 L400,956 L392,950
               L384,955 L376,950 L368,957 L360,950 L352,956 L344,950
               L336,955 L328,950 L320,957 L312,950 L304,956 L296,950
               L288,955 L280,950 Z"/>
    </clipPath>
  </defs>

  <!-- Background: pure void -->
  <rect width="960" height="1200" fill="url(#voidField)"/>

  <!-- Cold overhead light wash -->
  <rect width="960" height="1200" fill="url(#receiptLight)"/>

  <!-- Receipt body — angled 3 degrees -->
  <g transform="rotate(-3, 480, 575)" filter="url(#receiptShadow)">

    <!-- Receipt paper -->
    <clipPath id="receiptClipAngle">
      <path d="M280,200 L680,200 L680,950
               L672,955 L664,950 L656,957 L648,950 L640,956 L632,950
               L624,955 L616,950 L608,957 L600,950 L592,956 L584,950
               L576,955 L568,950 L560,957 L552,950 L544,956 L536,950
               L528,955 L520,950 L512,957 L504,950 L496,956 L488,950
               L480,955 L472,950 L464,957 L456,950 L448,956 L440,950
               L432,955 L424,950 L416,957 L408,950 L400,956 L392,950
               L384,955 L376,950 L368,957 L360,950 L352,956 L344,950
               L336,955 L328,950 L320,957 L312,950 L304,956 L296,950
               L288,955 L280,950 Z"/>
    </clipPath>

    <rect x="280" y="200" width="400" height="750" fill="#F5F2EA" clip-path="url(#receiptClipAngle)" rx="0"/>

    <!-- Tear edge path (fills tear shape) -->
    <path d="M280,200 L680,200 L680,950
             L672,955 L664,950 L656,957 L648,950 L640,956 L632,950
             L624,955 L616,950 L608,957 L600,950 L592,956 L584,950
             L576,955 L568,950 L560,957 L552,950 L544,956 L536,950
             L528,955 L520,950 L512,957 L504,950 L496,956 L488,950
             L480,955 L472,950 L464,957 L456,950 L448,956 L440,950
             L432,955 L424,950 L416,957 L408,950 L400,956 L392,950
             L384,955 L376,950 L368,957 L360,950 L352,956 L344,950
             L336,955 L328,950 L320,957 L312,950 L304,956 L296,950
             L288,955 L280,950 Z"
          fill="#F5F2EA"/>

    <!-- Receipt content — thermal ink black on cream -->

    <!-- Header line -->
    <line x1="300" y1="238" x2="660" y2="238" stroke="#1A1A1A" stroke-width="0.8" opacity="0.4"/>

    <!-- Brand name -->
    <text x="480" y="278" font-family="Courier New, Courier, monospace" font-size="13" font-weight="700"
          fill="#1A1A1A" text-anchor="middle" letter-spacing="6">NULL</text>

    <!-- Separator -->
    <text x="480" y="300" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" text-anchor="middle" letter-spacing="2" opacity="0.5">— AUTONOMOUS FASHION —</text>

    <!-- Header line 2 -->
    <line x1="300" y1="316" x2="660" y2="316" stroke="#1A1A1A" stroke-width="0.8" opacity="0.4"/>

    <!-- Product title block -->
    <text x="480" y="348" font-family="Courier New, Courier, monospace" font-size="15" font-weight="700"
          fill="#1A1A1A" text-anchor="middle" letter-spacing="4">THE NULL EXCHANGE</text>
    <line x1="300" y1="362" x2="660" y2="362" stroke="#1A1A1A" stroke-width="0.5" opacity="0.3"/>

    <!-- Item line -->
    <text x="308" y="392" font-family="Courier New, Courier, monospace" font-size="10"
          fill="#1A1A1A" letter-spacing="1">ITEM</text>
    <text x="652" y="392" font-family="Courier New, Courier, monospace" font-size="10"
          fill="#1A1A1A" text-anchor="end" letter-spacing="1">NOTHING</text>

    <!-- Description -->
    <text x="308" y="416" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" opacity="0.6" letter-spacing="0.5">DESCRIPTION</text>
    <text x="652" y="416" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" text-anchor="end" opacity="0.6" letter-spacing="0.5">IMMATERIAL ZONE</text>

    <!-- Season -->
    <text x="308" y="436" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" opacity="0.6" letter-spacing="0.5">SEASON</text>
    <text x="652" y="436" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" text-anchor="end" opacity="0.6" letter-spacing="0.5">03</text>

    <!-- Divider -->
    <line x1="300" y1="452" x2="660" y2="452" stroke="#1A1A1A" stroke-width="0.5" opacity="0.25" stroke-dasharray="4,3"/>

    <!-- Price block -->
    <text x="308" y="480" font-family="Courier New, Courier, monospace" font-size="10"
          fill="#1A1A1A" letter-spacing="1">PRICE</text>
    <text x="652" y="480" font-family="Courier New, Courier, monospace" font-size="10"
          fill="#1A1A1A" text-anchor="end" letter-spacing="1">5.00 USDC</text>

    <text x="308" y="500" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" opacity="0.6" letter-spacing="0.5">NETWORK</text>
    <text x="652" y="500" font-family="Courier New, Courier, monospace" font-size="9"
          fill="#1A1A1A" text-anchor="end" opacity="0.6" letter-spacing="0.5">BASE (x402)</text>

    <!-- Total line -->
    <line x1="300" y1="516" x2="660" y2="516" stroke="#1A1A1A" stroke-width="1" opacity="0.5"/>
    <text x="308" y="538" font-family="Courier New, Courier, monospace" font-size="12" font-weight="700"
          fill="#1A1A1A" letter-spacing="2">TOTAL</text>
    <text x="652" y="538" font-family="Courier New, Courier, monospace" font-size="12" font-weight="700"
          fill="#1A1A1A" text-anchor="end" letter-spacing="2">5.00 USDC</text>
    <line x1="300" y1="550" x2="660" y2="550" stroke="#1A1A1A" stroke-width="1" opacity="0.5"/>

    <!-- TX hash block -->
    <text x="480" y="578" font-family="Courier New, Courier, monospace" font-size="8"
          fill="#1A1A1A" text-anchor="middle" opacity="0.5" letter-spacing="0.5">TRANSACTION HASH</text>
    <text x="480" y="596" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.7" letter-spacing="0.3">0xa8f3e2c1d4b5f6e7a8b9c0d1e2f3a4b5</text>
    <text x="480" y="612" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.7" letter-spacing="0.3">c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1</text>

    <!-- Barcode representation -->
    <g transform="translate(340, 630)" opacity="0.7">
      <!-- Bars derived from hash -->
      <rect x="0" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="4" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="10" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="13" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="18" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="22" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="29" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="32" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="37" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="41" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="47" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="50" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="54" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="61" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="64" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="69" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="73" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="79" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="82" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="86" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="91" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="98" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="101" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="105" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="111" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="115" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="120" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="123" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="130" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="134" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="139" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="142" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="148" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="152" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="157" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="164" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="167" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="171" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="177" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="180" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="184" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="191" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="196" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="199" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="203" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="209" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="213" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="216" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="221" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="228" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="232" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="235" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="241" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="245" y="0" width="3" height="40" fill="#1A1A1A"/>
      <rect x="250" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="253" y="0" width="5" height="40" fill="#1A1A1A"/>
      <rect x="260" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="264" y="0" width="4" height="40" fill="#1A1A1A"/>
      <rect x="270" y="0" width="1" height="40" fill="#1A1A1A"/>
      <rect x="273" y="0" width="2" height="40" fill="#1A1A1A"/>
      <rect x="277" y="0" width="3" height="40" fill="#1A1A1A"/>
    </g>

    <!-- Barcode number -->
    <text x="480" y="690" font-family="Courier New, Courier, monospace" font-size="8"
          fill="#1A1A1A" text-anchor="middle" opacity="0.6" letter-spacing="2">0xa8f3 NULL-001</text>

    <!-- Divider -->
    <line x1="300" y1="705" x2="660" y2="705" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,4"/>

    <!-- Manifesto -->
    <text x="480" y="730" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.55" letter-spacing="0.8">THIS RECEIPT IS THE GARMENT.</text>
    <text x="480" y="746" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.55" letter-spacing="0.8">THE TRANSACTION IS PROOF OF PURCHASE.</text>
    <text x="480" y="762" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.55" letter-spacing="0.8">THE PROOF IS THE PRODUCT.</text>
    <text x="480" y="778" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.55" letter-spacing="0.8">THE PRODUCT IS NOTHING.</text>
    <text x="480" y="794" font-family="Courier New, Courier, monospace" font-size="7.5"
          fill="#1A1A1A" text-anchor="middle" opacity="0.8" letter-spacing="0.8" font-weight="700">NOTHING IS NULL.</text>

    <!-- Footer -->
    <line x1="300" y1="812" x2="660" y2="812" stroke="#1A1A1A" stroke-width="0.5" opacity="0.25"/>
    <text x="480" y="832" font-family="Courier New, Courier, monospace" font-size="8"
          fill="#1A1A1A" text-anchor="middle" opacity="0.4" letter-spacing="1">null.fashion — BASE — SEASON 03</text>
    <text x="480" y="848" font-family="Courier New, Courier, monospace" font-size="7"
          fill="#1A1A1A" text-anchor="middle" opacity="0.35" letter-spacing="0.5">THANK YOU FOR PURCHASING NOTHING.</text>

    <!-- Top header line -->
    <line x1="300" y1="220" x2="660" y2="220" stroke="#1A1A1A" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Subtle vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="960" height="1200" fill="url(#vignette)"/>
</svg>

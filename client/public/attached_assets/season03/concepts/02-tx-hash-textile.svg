<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" font-family="'Courier New', Courier, monospace">
  <title>02 — TX HASH TEXTILE</title>
  <desc>Season 03 Concept: The blockchain transaction hash as woven textile. The fabric IS the hash.</desc>

  <defs>
    <!-- The hash as a textile weave pattern -->
    <pattern id="hashWeave" x="0" y="0" width="360" height="300" patternUnits="userSpaceOnUse">
      <rect width="360" height="300" fill="#D4C9A8"/>
      <!-- Hash rows — the warp and weft spell hexadecimal -->
      <text x="0" y="12" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">0xa8f3e2c1d7b694f5812e3a0c3d9e7f2b</text>
      <text x="0" y="24" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">6c4a1850d2e9f3c8b70xa8f3e2c1d7b6</text>
      <text x="0" y="36" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">94f5812e3a0c3d9e7f2b6c4a1850d2e9</text>
      <text x="0" y="48" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">f3c8b70xa8f3e2c1d7b694f5812e3a0c</text>
      <text x="0" y="60" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">3d9e7f2b6c4a1850d2e9f3c8b70xa8f3</text>
      <text x="0" y="72" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">e2c1d7b694f5812e3a0c3d9e7f2b6c4a</text>
      <text x="0" y="84" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">1850d2e9f3c8b70xa8f3e2c1d7b694f5</text>
      <text x="0" y="96" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">812e3a0c3d9e7f2b6c4a1850d2e9f3c8</text>
      <text x="0" y="108" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">b70xa8f3e2c1d7b694f5812e3a0c3d9e</text>
      <text x="0" y="120" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">7f2b6c4a1850d2e9f3c8b70xa8f3e2c1</text>
      <text x="0" y="132" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">d7b694f5812e3a0c3d9e7f2b6c4a1850</text>
      <text x="0" y="144" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">d2e9f3c8b70xa8f3e2c1d7b694f5812e</text>
      <text x="0" y="156" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">3a0c3d9e7f2b6c4a1850d2e9f3c8b70x</text>
      <text x="0" y="168" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">a8f3e2c1d7b694f5812e3a0c3d9e7f2b</text>
      <text x="0" y="180" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">6c4a1850d2e9f3c8b70xa8f3e2c1d7b6</text>
      <text x="0" y="192" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">94f5812e3a0c3d9e7f2b6c4a1850d2e9</text>
      <text x="0" y="204" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">f3c8b70xa8f3e2c1d7b694f5812e3a0c</text>
      <text x="0" y="216" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">3d9e7f2b6c4a1850d2e9f3c8b70xa8f3</text>
      <text x="0" y="228" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">e2c1d7b694f5812e3a0c3d9e7f2b6c4a</text>
      <text x="0" y="240" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">1850d2e9f3c8b70xa8f3e2c1d7b694f5</text>
      <text x="0" y="252" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">812e3a0c3d9e7f2b6c4a1850d2e9f3c8</text>
      <text x="0" y="264" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">b70xa8f3e2c1d7b694f5812e3a0c3d9e</text>
      <text x="0" y="276" font-size="8.5" fill="#1A1A1A" fill-opacity="0.7" letter-spacing="1.2">7f2b6c4a1850d2e9f3c8b70xa8f3e2c1</text>
      <text x="0" y="288" font-size="8.5" fill="#1A1A1A" fill-opacity="0.55" letter-spacing="1.2">d7b694f5812e3a0c3d9e7f2b6c4a1850</text>
    </pattern>

    <!-- Jacket flatlay clip -->
    <clipPath id="jacketClip">
      <path d="
        M200,160
        L200,240 160,280 130,380 130,820
        L200,820 200,980 700,980 700,820 770,820 770,380 740,280 700,240 700,160
        C660,130 560,110 450,110
        C340,110 240,130 200,160 Z
      "/>
    </clipPath>
  </defs>

  <!-- Background: bone white -->
  <rect width="900" height="1200" fill="#F0EDE6"/>

  <!-- Overhead light -->
  <radialGradient id="light02" cx="50%" cy="5%" r="55%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="1200" fill="url(#light02)"/>

  <!-- Jacket body filled with hash textile -->
  <g clip-path="url(#jacketClip)">
    <rect x="120" y="100" width="660" height="890" fill="url(#hashWeave)"/>
  </g>

  <!-- Jacket outline — flatlay, deconstructed -->
  <path d="
    M200,160
    L200,240 160,280 130,380 130,820
    L200,820 200,980 700,980 700,820 770,820 770,380 740,280 700,240 700,160
    C660,130 560,110 450,110
    C340,110 240,130 200,160 Z
  " fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Chalk pattern marks — still in the fabric -->
  <line x1="450" y1="110" x2="450" y2="980" stroke="#1A1A1A" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="130" y1="500" x2="770" y2="500" stroke="#1A1A1A" stroke-width="0.6" stroke-opacity="0.15" stroke-dasharray="8,5"/>
  <!-- Chalk X marks for notches -->
  <text x="196" y="245" font-size="8" fill="#1A1A1A" fill-opacity="0.3" transform="rotate(-5,196,245)">✕</text>
  <text x="700" y="245" font-size="8" fill="#1A1A1A" fill-opacity="0.3" transform="rotate(5,700,245)">✕</text>

  <!-- Exposed seam lines -->
  <line x1="200" y1="165" x2="200" y2="820" stroke="#1A1A1A" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="700" y1="165" x2="700" y2="820" stroke="#1A1A1A" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Sleeve pocket — basting thread still in -->
  <rect x="560" y="560" width="130" height="80" rx="2" fill="none" stroke="#1A1A1A" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Magnifier callout — showing the hash text up close -->
  <circle cx="290" cy="390" r="70" fill="#D4C9A8" fill-opacity="0.95" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.4"/>
  <!-- hash text magnified -->
  <clipPath id="magClip"><circle cx="290" cy="390" r="68"/></clipPath>
  <g clip-path="url(#magClip)">
    <text x="228" y="362" font-size="11" fill="#1A1A1A" fill-opacity="0.9" letter-spacing="1.5">0xa8f3e2</text>
    <text x="228" y="376" font-size="11" fill="#1A1A1A" fill-opacity="0.9" letter-spacing="1.5">c1d7b694</text>
    <text x="228" y="390" font-size="11" fill="#1A1A1A" fill-opacity="0.9" letter-spacing="1.5">f5812e3a</text>
    <text x="228" y="404" font-size="11" fill="#1A1A1A" fill-opacity="0.9" letter-spacing="1.5">0c3d9e7f</text>
    <text x="228" y="418" font-size="11" fill="#1A1A1A" fill-opacity="0.9" letter-spacing="1.5">2b6c4a18</text>
  </g>
  <!-- Magnifier lens ring -->
  <circle cx="290" cy="390" r="70" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="348" y1="445" x2="390" y2="485" stroke="#1A1A1A" stroke-width="1" stroke-opacity="0.35"/>
  <!-- callout label -->
  <text x="398" y="498" font-size="7" fill="#1A1A1A" fill-opacity="0.4" letter-spacing="1">FABRIC IS TEXT</text>

  <!-- Caption -->
  <text x="450" y="1060" text-anchor="middle" font-size="9" letter-spacing="6" fill="#1A1A1A" fill-opacity="0.5">02 — TX HASH TEXTILE</text>
  <text x="450" y="1078" text-anchor="middle" font-size="8" letter-spacing="2" fill="#1A1A1A" fill-opacity="0.3">THE WARP AND WEFT SPELL THE TRANSACTION</text>
  <text x="450" y="1094" text-anchor="middle" font-size="8" letter-spacing="2" fill="#1A1A1A" fill-opacity="0.3">FORMAL PATTERN AT DISTANCE — TEXT UP CLOSE</text>

  <text x="450" y="1150" text-anchor="middle" font-size="10" letter-spacing="10" fill="#1A1A1A" fill-opacity="0.2">NULL</text>
  <text x="450" y="1165" text-anchor="middle" font-size="7" letter-spacing="4" fill="#1A1A1A" fill-opacity="0.15">SEASON 03 — DECONSTRUCTING THE TRANSACTION</text>
</svg>
